# =============================================================================
# Apache Superset — Local Development Docker Compose
# =============================================================================
# Standalone compose file for running Superset locally without the full stack.
# Usage: cd dashboard && docker compose up
# =============================================================================

version: "3.9"

services:
  superset:
    image: apache/superset:latest
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-change-me-for-dev}
      - SUPERSET_CONFIG_PATH=/app/pythonpath/superset_config.py
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - superset_home:/app/superset_home
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname User
          --email admin@communitypulse.org
          --password admin123 &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "

volumes:
  superset_home:

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    depends_on:
      - redis

  # ---------------------------------------------------------------------------
  # Google ADK Agents Service
  # ---------------------------------------------------------------------------
  agents:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
    env_file:
      - .env
    volumes:
      - ./agents:/app/agents
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # Upstash Redis (local substitute using standard Redis for dev)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ---------------------------------------------------------------------------
  # Apache Superset (analytics dashboard)
  # ---------------------------------------------------------------------------
  superset:
    image: apache/superset:latest
    ports:
      - "8088:8088"
    env_file:
      - .env
    volumes:
      - ./dashboard/superset_config.py:/app/pythonpath/superset_config.py
      - superset_home:/app/superset_home
    environment:
      - SUPERSET_CONFIG_PATH=/app/pythonpath/superset_config.py

volumes:
  redis_data:
  superset_home:
